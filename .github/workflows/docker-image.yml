name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build jar
        run: cd bookmarker-api && ./mvnw package -DskipTests

      - name: Build the Docker image
        run: docker build ./bookmarker-api --file ./bookmarker-api/Dockerfile --tag lucas0429/bookmarker-api:latest
