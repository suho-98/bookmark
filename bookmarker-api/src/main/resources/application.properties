spring.application.name=bookmarker-api


spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


spring.flyway.locations=classpath:/db/migration/{vendor}

#------springBoot profile 구분자
#progile=k8s 프로파일명
#${DB_HOST:localhost} DB_HOST 환경변수가 있다묜 적용하고 없다면 localhost


spring.config.active.on-profile=k8s
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_DATEBASE:appdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
